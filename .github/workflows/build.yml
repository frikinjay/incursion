name: Build and Release Incursion

on:
  push:
    branches:
      - main
  workflow_dispatch: 

permissions:
  contents: write

# ==========================================
# CHANGE THIS VARIABLE BEFORE PUSH!
# ==========================================
env:
  RELEASE_VERSION: "v1.0.6"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "Incursion ${{ env.RELEASE_VERSION }}"
          draft: false
          prerelease: false
          make_latest: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage