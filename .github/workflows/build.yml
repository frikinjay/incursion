name: Build Incursion

# This tells GitHub WHEN to run the script. 
# workflow_dispatch means you trigger it manually via a button on GitHub.
on:
  workflow_dispatch: 

jobs:
  build:
    # This matrix tells GitHub to spin up 3 separate cloud computers simultaneously.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use the Node version you are currently developing on

      - name: Install Dependencies
        run: npm install

      # Because npm run build triggers electron-builder, it will automatically 
      # detect the OS of the runner and build the .exe, .dmg, or .AppImage accordingly!
      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This grabs the finished files from the dist/ folder and uploads them 
      # so you can download them from the GitHub dashboard.
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Incursion-Release-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
          retention-days: 7