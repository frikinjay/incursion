<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incursion Mod Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="titlebar">
        <div class="titlebar-left">
            <img src="icon.svg" alt="" class="app-icon" onerror="this.style.display='none'">
            <span class="app-title">Incursion</span>
        </div>
        <div class="titlebar-right">
            <button id="minBtn" class="win-btn" title="Minimize">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect fill="currentColor" width="10" height="1" x="1" y="6"></rect></svg>
            </button>
            <button id="maxBtn" class="win-btn" title="Maximize">
                <svg width="12" height="12" viewBox="0 0 12 12"><rect width="9" height="9" x="1.5" y="1.5" fill="none" stroke="currentColor"></rect></svg>
            </button>
            <button id="closeBtn" class="win-btn close-btn" title="Close">
                <svg width="12" height="12" viewBox="0 0 12 12"><polygon fill="currentColor" fill-rule="evenodd" points="11 1.576 6.583 6 11 10.424 10.424 11 6 6.583 1.576 11 1 10.424 5.417 6 1 1.576 1.576 1 6 5.417 10.424 1"></polygon></svg>
            </button>
        </div>
    </header>

    <div id="mainContainer">
        
        <div id="homeView" class="view-panel active">
            <div class="packs-header">
                <h2>Incursion Modpacks</h2>
                <div class="header-buttons">
                    <button id="showCreatePackBtn" class="success-btn">Create Modpack</button>
                    <button id="addModpackBtn" class="primary-btn">Add Modpack</button>
                    <button id="showApiKeysBtn" class="secondary-btn">API Keys</button>
                </div>
            </div>
            <div id="packsList" class="packs-grid"></div>
        </div>

        <div id="packDetailsScreen" class="view-panel hidden">
            <div class="detail-hero" style="display: flex; justify-content: space-between; align-items: flex-start; background: var(--bg-glass-heavy); padding: 20px; border-radius: 0; border: 1px solid var(--border-color); margin-bottom: 20px;">
                <div class="hero-left" style="display: flex; gap: 20px; align-items: center;">
                    <img id="detailPackIcon" src="icon.svg" style="width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border-color);" alt="">
                    <div>
                        <h2 id="detailPackName" style="margin: 0 0 8px 0; font-size: 1.8rem;">Pack Name</h2>
                        <p id="detailPackMetaSub" style="margin: 0 0 8px 0; color: var(--text-muted); font-size: 0.95rem; font-weight: 500;"></p>
                        <p id="detailPackDesc" style="margin: 0; color: #ccc; font-size: 0.9rem; max-width: 600px; line-height: 1.4;"></p>
                    </div>
                </div>
                <button class="back-btn" id="backToHomeBtn">← Back</button>
            </div>

            <div class="details-sub" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; gap: 10px;">
                    <button id="addModsToPackBtn" class="primary-btn">+ Add Mods (Both)</button>
                    <button id="addModsMrBtn" class="secondary-btn" style="color: #1BD96A; border-color: rgba(27, 217, 106, 0.3);">+ Add MR</button>
                    <button id="addModsCfBtn" class="secondary-btn" style="color: #F16436; border-color: rgba(241, 100, 54, 0.3);">+ Add CF</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="exportPacksBtn" class="secondary-btn">Export Both</button>
                    <button id="exportMRBtn" class="secondary-btn" style="color: #1BD96A; border-color: rgba(27, 217, 106, 0.3);">Export MR Pack</button>
                    <button id="exportCFBtn" class="secondary-btn" style="color: #F16436; border-color: rgba(241, 100, 54, 0.3);">Export CF Pack</button>
                </div>
            </div>
            
            <div class="pack-controls-bar">
                <div class="sort-group">
                    <label>Sort:</label>
                    <select id="packSortSelect">
                        <option value="name-asc">Alphabetical (A-Z)</option>
                        <option value="name-desc">Alphabetical (Z-A)</option>
                        <option value="date-desc">Date Added (Newest)</option>
                        <option value="date-asc">Date Added (Oldest)</option>
                    </select>
                </div>
                <div class="action-group">
                    <button id="redownloadAllBtn" class="secondary-btn">Redownload All</button> 
                    <button id="refreshInstalledCacheBtn" class="secondary-btn">Refresh Cache</button>
                    <button id="checkUpdatesBtn" class="secondary-btn">Check Updates</button>
                    <button id="updateAllBtn" class="success-btn" disabled>Update All</button>
                </div>
            </div>
            
            <div class="installed-filters-bar" style="display: flex; gap: 12px; margin-bottom: 24px;">
                <input type="text" id="installedSearchInput" placeholder="Search installed mods..." style="flex: 1;">
                <select id="installedEnvSelect">
                    <option value="all">All Environments</option>
                    <option value="client">Client-side Only</option>
                    <option value="server">Server-side Only</option>
                    <option value="both">Both Environments</option>
                </select>
                <select id="installedPlatformSelect">
                    <option value="all">All Platforms</option>
                    <option value="both">Both Platforms Only</option>
                    <option value="modrinth">Modrinth Only</option>
                    <option value="curseforge">CurseForge Only</option>
                </select>
            </div>

            <div id="actionProgressContainer">
                <div id="actionProgressBar"></div>
            </div>
            
            <div id="virtualScrollContainer" class="virtual-scroll-container">
                <div id="virtualScrollSpacer" class="virtual-scroll-spacer"></div>
                <div id="virtualScrollContent" class="virtual-scroll-content"></div>
            </div>
        </div>

        <div id="searchView" class="view-panel hidden">
            <div class="view-header">
                <button class="back-btn" id="backFromSearchBtn">← Back</button>
                <h2 id="searchTitle">Search Mods</h2>
            </div>
            
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search for a mod...">
                <select id="versionSelect" disabled><option value="">Loading...</option></select>
                <select id="loaderSelect"><option value="fabric">Fabric</option><option value="neoforge">NeoForge</option></select>
                <button id="searchBtn" class="primary-btn">Search</button>
                <button id="refreshSearchCacheBtn" class="secondary-btn">Refresh Cache</button> 
            </div>
            
            <div id="resultsDiv"></div>
            
            <div class="pagination hidden" id="paginationControls">
                <button id="prevBtn" disabled>Previous</button>
                <span id="pageInfo">Page 1</span>
                <button id="nextBtn" disabled>Next</button>
            </div>
        </div>

        <div id="apiKeysView" class="view-panel hidden">
            <div class="view-header">
                <button class="back-btn" id="backFromApiKeysBtn">← Back</button>
                <h2>API Settings</h2>
            </div>
            
            <div style="background: var(--bg-glass-heavy); padding: 20px; border-radius: 0; border: 1px solid var(--border-color); max-width: 600px;">
                <p style="color: var(--text-muted); margin-top: 0; margin-bottom: 20px;">
                    Enter your API keys below. These will override any keys found in your local .env file.
                </p>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">CurseForge Core API Key</label>
                        <input type="password" id="cfKeyInput" style="width: 100%; box-sizing: border-box;" placeholder="$2a$10$...">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Modrinth API Key</label>
                        <input type="password" id="mrKeyInput" style="width: 100%; box-sizing: border-box;" placeholder="mpo_...">
                    </div>
                    <button id="saveApiKeysBtn" class="success-btn" style="margin-top: 10px; width: fit-content;">Save API Keys</button>
                </div>
            </div>
        </div>
    </div>

    <div id="createPackForm" class="modal-panel hidden">
        <div class="modal-content">
            <h3 id="modalFormTitle">Create New Modpack</h3>
            
            <div style="display: flex; gap: 15px; margin-bottom: 5px;">
                <input type="text" id="packNameInput" placeholder="Pack Name" style="flex: 2;">
                <input type="text" id="packVersionInput" placeholder="Version (e.g. 1.0.0)" value="1.0.0" style="flex: 1;">
            </div>
            <input type="text" id="packAuthorInput" placeholder="Author (Optional)" style="margin-bottom: 5px;">
            <textarea id="packDescInput" placeholder="Pack Description..." style="height: 60px; resize: none; margin-bottom: 5px;"></textarea>

            <div class="dir-picker-row" style="margin-bottom: 5px;">
                <select id="createPackVersionSelect" disabled style="flex: 1;"><option value="">Loading versions...</option></select>
                <select id="createPackLoaderSelect" style="flex: 1;">
                    <option value="fabric">Fabric</option>
                    <option value="neoforge">NeoForge</option>
                    <option value="forge">Forge</option>
                    <option value="quilt">Quilt</option>
                </select>
                <input type="text" id="packLoaderVersionInput" placeholder="Loader Ver (Opt)" style="flex: 1;">
            </div>

            <div class="icon-selector-row" style="display: flex; gap: 15px; align-items: center; margin-bottom: 10px;">
                <button id="selectIconBtn" class="secondary-btn">Upload Custom Icon</button>
                <img id="packIconPreview" src="icon.svg" style="width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border-color); object-fit: cover;">
            </div>

            <div class="dir-picker-row" id="modalDirRow">
                <input type="text" id="packDirInput" placeholder="Select Installation Directory..." readonly style="flex: 1;">
                <button id="browseDirBtn" class="secondary-btn">Browse</button>
            </div>

            <div class="form-actions" style="margin-top: 15px;">
                <button id="cancelCreateBtn" class="secondary-btn">Cancel</button>
                <button id="confirmCreateBtn" class="success-btn">Save Modpack</button>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>
    
    <script src="util/ui.js"></script>
    <script src="util/renderer/state.js"></script>
    <script src="util/renderer/home.js"></script>
    <script src="util/renderer/details.js"></script>
    <script src="util/renderer/search.js"></script>
    <script src="util/renderer/settings.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
